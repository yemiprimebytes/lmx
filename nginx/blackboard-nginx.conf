server {

	root /home/django/blackboard/;

	# Add index.php to the list if you are using PHP
	index index.html index.htm index.nginx-debian.html;
	server_name blackboard.citpm.org; # managed by Certbot
 	client_max_body_size 5M;

	location / {
		# perform reverse proxing here.
		proxy_pass http://blackboard.primebytes.ca:6500/;
		proxy_set_header Host $http_host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}
	
	location /static {
		#autoindex on;
		root /home/django/blackboard/;
		# try_files /tmp$uri /srv/www/site$uri =404;
	}

	# configure second statics
	location /media {
		root /home/django/blackboard/;
	}

}
